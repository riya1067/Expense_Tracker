<!DOCTYPE html>

<head>
  
  
  <title>Expense Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    .button-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2; 
    }

    .rounded-button {
      display: inline-block;
      padding: 10px 20px;
      background-color: rgb(0, 0, 0);
      border: 2px solid rgb(255, 255, 255);
      border-radius: 20px;
      font-size: 16px;
      color: rgb(255, 255, 255);
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      margin-right: 10px;
      transition: box-shadow 0.3s ease;
    }

    .rounded-button:active {
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .section {
      position: relative;
      z-index: 1; 
    }

    #bgVideo {
      width: 100%;
      height: auto;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

  <div class="button-container">
    <a href="/register" class="rounded-button">Sign Up</a>
    <a href="/login" class="rounded-button">Log in</a>
  </div>

  <div class="section">
    <video id="bgVideo" preload="true" autoplay loop muted>
      <source src="/static/mainbg2.mp4" type="video/mp4">
      
    </video>
  </div>
  

</body>
</html>
